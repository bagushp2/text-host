<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>text▍host — simpan &amp; bagikan teks</title>
  <meta name="description" content="Layanan hosting teks sederhana. Tempel teks atau kode, dapatkan link permanen untuk dibagikan." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23161b22'/%3E%3Crect x='9' y='8' width='6' height='16' rx='1' fill='%238b7cff'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <a class="brand" href="/">text<span class="caret"></span>host</a>
      <span class="tagline">tempel · simpan · bagikan</span>
    </header>

    <main>
      <div class="panel" style="margin-top:22px;">
        <div class="panel-head">
          <span class="dot"></span>
          <span>editor</span>
          <span class="spacer"></span>
          <span id="counter">0 baris · 0 B</span>
        </div>
        <textarea id="content" class="editor" spellcheck="false"
          placeholder="Tempel teks atau kode di sini…"></textarea>
      </div>

      <div class="controls">
        <div class="field grow">
          <label class="lbl" for="title">Judul (opsional)</label>
          <input type="text" id="title" maxlength="120" placeholder="mis. konfigurasi nginx" />
        </div>

        <div class="field">
          <label class="lbl" for="language">Sintaks</label>
          <select id="language">
            <option value="plaintext">Teks biasa</option>
            <option value="javascript">JavaScript</option>
            <option value="typescript">TypeScript</option>
            <option value="python">Python</option>
            <option value="bash">Bash / Shell</option>
            <option value="json">JSON</option>
            <option value="yaml">YAML</option>
            <option value="html">HTML</option>
            <option value="css">CSS</option>
            <option value="sql">SQL</option>
            <option value="ini">INI / Config</option>
            <option value="xml">XML / M3U</option>
            <option value="markdown">Markdown</option>
            <option value="go">Go</option>
            <option value="rust">Rust</option>
            <option value="java">Java</option>
            <option value="php">PHP</option>
            <option value="c">C</option>
            <option value="cpp">C++</option>
          </select>
        </div>

        <div class="field">
          <label class="lbl" for="expiry">Kedaluwarsa</label>
          <select id="expiry">
            <option value="never">Tidak pernah</option>
            <option value="10m">10 menit</option>
            <option value="1h">1 jam</option>
            <option value="1d">1 hari</option>
            <option value="1w">1 minggu</option>
            <option value="1M">1 bulan</option>
          </select>
        </div>

        <label class="check" title="Paste dihapus otomatis setelah dibuka satu kali">
          <input type="checkbox" id="burn" /> Hapus setelah dibaca
        </label>

        <div class="actions">
          <button class="btn" id="clearBtn" type="button">Bersihkan</button>
          <button class="btn primary" id="saveBtn" type="button">Buat paste</button>
        </div>
      </div>

      <div class="alert" id="alert"></div>

      <section class="stub" id="stub">
        <div class="row1"><span class="live"></span><span id="stubStatus">Paste dibuat — link siap dibagikan</span></div>
        <div class="linkbox">
          <input type="text" id="stubUrl" readonly />
          <button class="btn primary" id="copyBtn" type="button">Salin</button>
          <button class="btn" id="openBtn" type="button">Buka</button>
        </div>
        <div class="meta" id="stubMeta"></div>
      </section>

      <footer class="foot">
        <span>text▍host</span>
        <span class="dotsep">/</span>
        <span>maks 400 KB per paste</span>
        <span class="dotsep">/</span>
        <span>di-hosting di Vercel + Upstash</span>
      </footer>
    </main>
  </div>

  <div class="toast" id="toast">Tersalin ke clipboard</div>

  <script src="/create.js"></script>
</body>
</html>
